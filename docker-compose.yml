version: "3.8"

services:
  # PostgreSQL 16 - Main database
  postgres:
    image: postgres:16-alpine
    container_name: kisan_ai_postgres
    environment:
      POSTGRES_USER: kisan
      POSTGRES_PASSWORD: kisan_secure_dev_password  # Change in production!
      POSTGRES_DB: kisan_ai
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Initialize database with SQL files
      # - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisan -d kisan_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kisan_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 7 - Cache and message queue
  redis:
    image: redis:7-alpine
    container_name: kisan_ai_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kisan_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Application (optional - for docker-compose up to include app)
  # Uncomment to run app in Docker
  # app:
  #   build: .
  #   container_name: kisan_ai_app
  #   environment:
  #     DATABASE_URL: postgresql://kisan:kisan_secure_dev_password@postgres:5432/kisan_ai
  #     REDIS_URL: redis://redis:6379
  #     WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
  #     WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - kisan_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  kisan_network:
    driver: bridge
